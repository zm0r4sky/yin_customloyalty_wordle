<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YIN Wordle - Gamifikacja</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="stats-badge">
            <span id="streak-display">🔥 0</span>
            <span id="points-display">💰 0 pkt</span>
        </div>
        <h1>WORDLE</h1>
        <div class="offline-indicator" id="offline-indicator" style="display: none;">
            <span>Zrywam połączenie...</span>
        </div>
    </header>

    <main class="game-container">
        <!-- Toast Notifications -->
        <div id="toast-container"></div>

        <!-- Board Section — grows to fill remaining space -->
        <section class="board-section">
            <div id="board" class="board"></div>
        </section>

        <!-- Keyboard Section — always pinned to bottom -->
        <section class="keyboard-section">
            <div id="keyboard" class="keyboard">
            <div class="keyboard-row">
                <button data-key="A">A</button><button data-key="Ą">Ą</button><button data-key="B">B</button>
                <button data-key="C">C</button><button data-key="Ć">Ć</button><button data-key="D">D</button>
                <button data-key="E">E</button><button data-key="Ę">Ę</button><button data-key="F">F</button>
            </div>
            <div class="keyboard-row">
                <button data-key="G">G</button><button data-key="H">H</button><button data-key="I">I</button>
                <button data-key="J">J</button><button data-key="K">K</button><button data-key="L">L</button>
                <button data-key="Ł">Ł</button><button data-key="M">M</button><button data-key="N">N</button>
            </div>
            <div class="keyboard-row">
                <button data-key="O">O</button><button data-key="Ó">Ó</button><button data-key="P">P</button>
                <button data-key="R">R</button><button data-key="S">S</button><button data-key="Ś">Ś</button>
                <button data-key="T">T</button><button data-key="U">U</button><button data-key="W">W</button>
            </div>
            <div class="keyboard-row">
                <button data-key="BACKSPACE" class="wide-key key-secondary">COFNIJ</button>
                <button data-key="Y">Y</button><button data-key="Z">Z</button><button data-key="Ź">Ź</button>
                <button data-key="Ż">Ż</button>
                <button data-key="ENTER" class="wide-key key-primary">ENTER</button>
            </div>
            </div>
        </section>
    </main>

    <!-- Ad Overlay Modal -->
    <div id="ad-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content ad-content">
            <h2>Wiadomość od Sponsora</h2>
            <div class="ad-banner">
                <img id="ad-image" src="" alt="Reklama">
            </div>
            <p>Możesz pominąć reklamę za: <span id="ad-countdown" class="countdown">10</span> s</p>
            <button id="skip-ad-btn" class="btn-primary" disabled>Odbierz nagrodę</button>
        </div>
    </div>

    <!-- End Game Modal (Success/Fail summary) -->
    <div id="end-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2 id="end-title">Gratulacje!</h2>
            <p id="end-message">Zdobyto punkty: <strong id="end-points">0</strong></p>
            <div class="stats-summary">
                <div class="stat-box">
                    <span class="stat-value" id="stat-streak">0</span>
                    <span class="stat-label">Streak</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" id="stat-bonus">+0%</span>
                    <span class="stat-label">Bonus</span>
                </div>
            </div>
            <button id="close-end-modal" class="btn-secondary">Zakończ</button>
            <button id="play-again-btn" class="btn-primary" style="margin-top:10px;">Graj następną grę (Free Play)</button>
        </div>
    </div>

    <script type="module" src="mockApi.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
